[app]
title = "SubBark"
timezone = "Asia/Shanghai"
# 后台检查间隔，单位秒。
check_interval_seconds = 3600
# 续费提醒提前天数。
remind_before_days = 3
# Bark 推送地址。
notify_url = "https://api.day.app/your_bark_key"

[[subscriptions]]
# 订阅名称。
name = "Netflix"
# 页面分组分类。
category = "影音"
# 计费周期：week、month、quarter、year。
billing_cycle = "month"
# 续费锚点日期，可为历史日期。
payment_date = "2026-06-10"
# 单周期费用。
amount = 9.99
# 费用币种。
currency = "USD"

[[subscriptions]]
name = "iCloud+"
category = "云服务"
billing_cycle = "month"
payment_date = "2026-06-15"
amount = 21
currency = "CNY"

[[subscriptions]]
name = "Cursor"
category = "开发工具"
billing_cycle = "year"
payment_date = "2026-03-08"
amount = 192
currency = "USD"

[[subscriptions]]
name = "GitHub Copilot"
category = "开发工具"
billing_cycle = "month"
payment_date = "2026-06-01"
amount = 10
